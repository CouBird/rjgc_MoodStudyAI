<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学习统计接口测试</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #dbe3ef;
      --primary: #4f46e5;
      --info: #0ea5e9;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
    }

    .topbar {
      max-width: 1180px;
      min-height: 62px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--primary);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 44px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-body {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input {
      width: 100%;
      min-height: 40px;
      border: 1px solid #c9d4e5;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.14);
    }

    .btn {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: white;
      background: var(--primary);
      font-weight: 760;
    }

    .btn.secondary {
      color: var(--text);
      background: #e7edf5;
    }

    .btn.success {
      background: var(--success);
    }

    .btn.warning {
      background: var(--warning);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .status.ok {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .toolbar {
      margin: 18px 0;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .periods {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: white;
    }

    .periods button {
      min-width: 74px;
      border: 0;
      border-right: 1px solid var(--line);
      padding: 10px 14px;
      color: var(--muted);
      background: white;
      font-weight: 760;
    }

    .periods button:last-child {
      border-right: 0;
    }

    .periods button.active {
      color: white;
      background: var(--primary);
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .summary {
      margin-bottom: 18px;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .summary h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .summary p {
      margin: 0;
      color: var(--muted);
    }

    .date-range {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: white;
    }

    .metric span {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      display: block;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .metric small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
    }

    .panel h2 {
      margin: 0;
      padding: 18px 18px 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .chart {
      width: 100%;
      min-height: 280px;
    }

    .axis {
      stroke: #cbd5e1;
      stroke-width: 1;
    }

    .grid-line {
      stroke: #edf2f7;
      stroke-width: 1;
    }

    .study-line {
      fill: none;
      stroke: var(--primary);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .emotion-line {
      fill: none;
      stroke: var(--info);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .point {
      stroke: white;
      stroke-width: 2;
    }

    .tick {
      fill: var(--muted);
      font-size: 11px;
    }

    .raw {
      margin-top: 18px;
    }

    pre {
      margin: 0;
      max-height: 420px;
      overflow: auto;
      border-radius: 8px;
      padding: 14px;
      background: #101828;
      color: #e5e7eb;
      font-size: 12px;
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }

      .metrics {
        grid-template-columns: repeat(3, 1fr);
      }

      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .form-grid,
      .metrics {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .date-range {
        text-align: left;
      }

      .periods {
        width: 100%;
      }

      .periods button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">统</div>
        <span>学习统计接口测试</span>
      </div>
      <div id="loginState" class="status">未登录</div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-body">
        <div class="form-grid">
          <label>
            API 地址
            <input id="apiBase" value="http://127.0.0.1:8080/api/v1" />
          </label>
          <label>
            手机号
            <input id="phone" value="13800000001" />
          </label>
          <label>
            密码
            <input id="password" type="password" value="123456" />
          </label>
          <button id="loginBtn" class="btn" type="button">登录</button>
          <button id="registerBtn" class="btn secondary" type="button">注册</button>
        </div>
        <div id="authStatus" class="status"></div>
      </div>
    </section>

    <div class="toolbar">
      <div class="periods" aria-label="统计周期">
        <button type="button" data-period="week" class="active">本周</button>
        <button type="button" data-period="month">本月</button>
        <button type="button" data-period="year">本年</button>
      </div>
      <label>
        基准日期
        <input id="baseDate" type="date" />
      </label>
      <div class="toolbar-actions">
        <button id="refreshBtn" class="btn" type="button">刷新统计</button>
        <button id="seedBtn" class="btn success" type="button">生成测试数据</button>
        <button id="todayBtn" class="btn warning" type="button">今日概览</button>
      </div>
    </div>

    <section class="summary panel">
      <div>
        <h1 id="mainEmotion">主要情绪：-</h1>
        <p id="summaryText">登录后刷新统计。</p>
      </div>
      <div id="rangeText" class="date-range">-</div>
    </section>

    <section class="metrics" aria-label="统计指标">
      <div class="metric">
        <span>总学习时长</span>
        <strong id="totalHours">0.0h</strong>
        <small id="totalMinutes">0 分钟</small>
      </div>
      <div class="metric">
        <span>日均学习</span>
        <strong id="avgHours">0.0h</strong>
        <small id="avgMinutes">0 分钟/天</small>
      </div>
      <div class="metric">
        <span>连续打卡</span>
        <strong id="streakDays">0天</strong>
        <small>倒序扫描打卡记录</small>
      </div>
      <div class="metric">
        <span>完成打卡</span>
        <strong id="checkinCount">0次</strong>
        <small id="studyDays">0 个学习日</small>
      </div>
      <div class="metric">
        <span>有效会话</span>
        <strong id="sessionCount">0次</strong>
        <small>结束且不少于 10 分钟</small>
      </div>
      <div class="metric">
        <span>今日概览</span>
        <strong id="todayHours">-</strong>
        <small id="todayMeta">-</small>
      </div>
    </section>

    <section class="content-grid">
      <div class="panel">
        <h2>学习时长趋势</h2>
        <div class="panel-body">
          <div id="studyChart" class="chart"></div>
        </div>
      </div>

      <div class="panel">
        <h2>情绪变化趋势</h2>
        <div class="panel-body">
          <div id="emotionChart" class="chart"></div>
        </div>
      </div>
    </section>

    <section class="raw panel">
      <h2>原始响应</h2>
      <div class="panel-body">
        <pre id="rawJson">{}</pre>
      </div>
    </section>
  </main>

  <script>
    const state = {
      token: localStorage.getItem('statsDemoToken') || '',
      period: 'week',
      stats: null,
    };

    const emotionColors = {
      平静: '#4f46e5',
      自豪: '#16a34a',
      满足: '#0ea5e9',
      快乐: '#f59e0b',
      焦虑: '#dc2626',
      疲惫: '#9333ea',
      难过: '#64748b',
      自定义: '#111827',
    };

    function el(id) {
      return document.getElementById(id);
    }

    function setStatus(id, message, type = '') {
      const node = el(id);
      node.textContent = message;
      node.className = `status ${type}`;
    }

    function apiBase() {
      return el('apiBase').value.replace(/\/+$/, '');
    }

    async function request(path, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...(options.headers || {}),
      };

      if (state.token) {
        headers.Authorization = `Bearer ${state.token}`;
      }

      const response = await fetch(`${apiBase()}${path}`, {
        ...options,
        headers,
      });
      const payload = await response.json().catch(() => ({
        message: response.statusText,
      }));

      if (!response.ok || (typeof payload.code === 'number' && payload.code !== 0)) {
        throw new Error(payload.message || `HTTP ${response.status}`);
      }

      return payload.data;
    }

    async function login() {
      try {
        const data = await request('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            phone: el('phone').value.trim(),
            password: el('password').value,
          }),
        });
        state.token = data.token;
        localStorage.setItem('statsDemoToken', state.token);
        setStatus('authStatus', `已登录：${data.user.nickname}`, 'ok');
        setStatus('loginState', `已登录 ${data.user.nickname}`, 'ok');
        await loadToday();
        await loadStats();
      } catch (error) {
        setStatus('authStatus', error.message, 'error');
      }
    }

    async function register() {
      try {
        const phone = el('phone').value.trim();
        const data = await request('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            phone,
            nickname: `统计测试${phone.slice(-4)}`,
            password: el('password').value,
            confirmPassword: el('password').value,
            agreeTerms: true,
            agreePrivacy: true,
          }),
        });
        state.token = data.token;
        localStorage.setItem('statsDemoToken', state.token);
        setStatus('authStatus', `注册并登录：${data.user.nickname}`, 'ok');
        setStatus('loginState', `已登录 ${data.user.nickname}`, 'ok');
        await loadStats();
      } catch (error) {
        setStatus('authStatus', error.message, 'error');
      }
    }

    async function loadToday() {
      try {
        const data = await request('/users/me/stats/today');
        el('todayHours').textContent = `${Number(data.todayHours || 0).toFixed(1)}h`;
        el('todayMeta').textContent = `${data.todayMinutes || 0} 分钟，${data.validCheckin ? '已打卡' : '未打卡'}`;
      } catch (error) {
        el('todayHours').textContent = '-';
        el('todayMeta').textContent = error.message;
      }
    }

    async function loadStats() {
      try {
        const date = el('baseDate').value || localDateValue(new Date());
        const data = await request(`/users/me/stats?period=${state.period}&date=${date}`);
        state.stats = data;
        renderStats(data);
        setStatus('authStatus', '统计数据已刷新', 'ok');
      } catch (error) {
        setStatus('authStatus', error.message, 'error');
      }
    }

    async function createSampleData() {
      try {
        const suffix = String(Date.now()).slice(-6);
        const closeAt = new Date(Date.now() + 2 * 60 * 60 * 1000).toISOString();
        const room = await request('/rooms', {
          method: 'POST',
          body: JSON.stringify({
            name: `统计测试房${suffix}`,
            description: 'stats demo',
            capacity: 3,
            isPrivate: false,
            password: null,
            closeAt,
          }),
        });
        const seats = await request(`/rooms/${room.roomId}/seats`);
        const seat = seats.find((item) => item.status === 'available') || seats[0];
        const session = await request('/study-sessions', {
          method: 'POST',
          body: JSON.stringify({
            roomId: room.roomId,
            seatId: seat.seatId,
            mode: 'normal',
            studyContent: '统计页联调学习',
          }),
        });
        const ended = await request(`/study-sessions/${session.sessionId}`, {
          method: 'PATCH',
          body: JSON.stringify({
            status: 'ended',
            studyContent: '统计页联调结束',
            endedAt: new Date(Date.now() + 12 * 60 * 1000).toISOString(),
          }),
        });
        await request(`/study-sessions/${ended.sessionId}/emotion-records`, {
          method: 'POST',
          body: JSON.stringify({
            emotionTag: '平静',
            emotionScore: 7,
            userNote: '统计页联调情绪',
          }),
        });
        setStatus('authStatus', `已生成 ${ended.durationMinutes} 分钟有效学习记录`, 'ok');
        await loadToday();
        await loadStats();
      } catch (error) {
        setStatus('authStatus', error.message, 'error');
      }
    }

    function renderStats(data) {
      el('mainEmotion').textContent = `主要情绪：${data.mainEmotion || '-'}`;
      el('summaryText').textContent = data.summary || '-';
      el('rangeText').textContent = `${data.startDate} 至 ${data.endDate}`;
      el('totalHours').textContent = `${Number(data.totalHours || 0).toFixed(1)}h`;
      el('totalMinutes').textContent = `${data.totalMinutes || 0} 分钟`;
      el('avgHours').textContent = `${Number(data.averageDailyHours || 0).toFixed(1)}h`;
      el('avgMinutes').textContent = `${data.averageDailyMinutes || 0} 分钟/天`;
      el('streakDays').textContent = `${data.streakDays || 0}天`;
      el('checkinCount').textContent = `${data.checkinCount || 0}次`;
      el('studyDays').textContent = `${data.studyDays || 0} 个学习日`;
      el('sessionCount').textContent = `${data.validSessionCount || 0}次`;
      el('rawJson').textContent = JSON.stringify(data, null, 2);
      renderStudyChart(data.studyTrend || []);
      renderEmotionChart(data.emotionTrend || []);
    }

    function renderStudyChart(points) {
      const width = 680;
      const height = 260;
      const pad = 36;
      const maxValue = Math.max(1, ...points.map((item) => Number(item.hours) || 0));
      const usableWidth = width - pad * 2;
      const usableHeight = height - pad * 2;
      const coords = points.map((item, index) => {
        const x = pad + (points.length <= 1 ? 0 : (index / (points.length - 1)) * usableWidth);
        const y = height - pad - ((Number(item.hours) || 0) / maxValue) * usableHeight;
        return { ...item, x, y };
      });
      const path = coords.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
      const labels = coords.filter((_, index) => shouldShowTick(index, coords.length));

      el('studyChart').innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" width="100%" height="280" role="img" aria-label="学习时长趋势图">
          ${[0, 1, 2, 3].map((step) => {
            const y = pad + (step / 3) * usableHeight;
            return `<line class="grid-line" x1="${pad}" y1="${y}" x2="${width - pad}" y2="${y}"></line>`;
          }).join('')}
          <line class="axis" x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}"></line>
          <line class="axis" x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}"></line>
          <path class="study-line" d="${path || ''}"></path>
          ${coords.map((p) => `<circle class="point" cx="${p.x}" cy="${p.y}" r="5" fill="#4f46e5"><title>${p.date}: ${p.hours}h</title></circle>`).join('')}
          ${labels.map((p) => `<text class="tick" x="${p.x}" y="${height - 10}" text-anchor="middle">${shortDate(p.date)}</text>`).join('')}
          <text class="tick" x="6" y="${pad + 4}">${maxValue.toFixed(1)}h</text>
          <text class="tick" x="18" y="${height - pad + 4}">0</text>
        </svg>
      `;
    }

    function renderEmotionChart(points) {
      const width = 680;
      const height = 260;
      const pad = 36;
      const usableWidth = width - pad * 2;
      const usableHeight = height - pad * 2;

      if (!points.length) {
        el('emotionChart').innerHTML = '<div class="status">当前周期暂无情绪记录</div>';
        return;
      }

      const coords = points.map((item, index) => {
        const value = Number(item.emotionValue) || 0;
        const x = pad + (points.length <= 1 ? 0 : (index / (points.length - 1)) * usableWidth);
        const y = pad + (value / 7) * usableHeight;
        return { ...item, x, y };
      });
      const path = coords.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');

      el('emotionChart').innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" width="100%" height="280" role="img" aria-label="情绪变化趋势图">
          ${[0, 1, 2, 3, 4, 5, 6, 7].map((value) => {
            const y = pad + (value / 7) * usableHeight;
            return `<line class="grid-line" x1="${pad}" y1="${y}" x2="${width - pad}" y2="${y}"></line>`;
          }).join('')}
          <line class="axis" x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}"></line>
          <line class="axis" x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}"></line>
          <path class="emotion-line" d="${path}"></path>
          ${coords.map((p) => {
            const color = emotionColors[p.emotionTag] || '#111827';
            return `<circle class="point" cx="${p.x}" cy="${p.y}" r="6" fill="${color}"><title>${p.date}: ${p.emotionTag}</title></circle>`;
          }).join('')}
          ${coords.filter((_, index) => shouldShowTick(index, coords.length)).map((p) => `<text class="tick" x="${p.x}" y="${height - 10}" text-anchor="middle">${shortDate(p.date)}</text>`).join('')}
          <text class="tick" x="4" y="${pad + 4}">平静</text>
          <text class="tick" x="4" y="${height - pad + 4}">自定义</text>
        </svg>
      `;
    }

    function shouldShowTick(index, total) {
      if (total <= 12) return true;
      const every = Math.ceil(total / 8);
      return index % every === 0 || index === total - 1;
    }

    function shortDate(value) {
      return String(value).slice(5);
    }

    function localDateValue(date) {
      const offset = date.getTimezoneOffset();
      const local = new Date(date.getTime() - offset * 60 * 1000);
      return local.toISOString().slice(0, 10);
    }

    document.querySelectorAll('[data-period]').forEach((button) => {
      button.addEventListener('click', () => {
        state.period = button.dataset.period;
        document.querySelectorAll('[data-period]').forEach((item) => {
          item.classList.toggle('active', item === button);
        });
        loadStats();
      });
    });

    el('baseDate').value = localDateValue(new Date());
    el('loginBtn').addEventListener('click', login);
    el('registerBtn').addEventListener('click', register);
    el('refreshBtn').addEventListener('click', loadStats);
    el('seedBtn').addEventListener('click', createSampleData);
    el('todayBtn').addEventListener('click', loadToday);

    if (state.token) {
      setStatus('loginState', '已加载本地 token', 'ok');
    }
  </script>
</body>
</html>
